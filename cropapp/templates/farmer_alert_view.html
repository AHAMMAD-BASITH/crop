<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Alerts</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            width: 50%;
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }
        h2 {
            text-align: center;
        }
        .alert {
            padding: 15px;
            margin-bottom: 10px;
            border-left: 5px solid #28a745;
            background: #e9f7ef;
        }
        .alert-date {
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Alerts</h2>
        {% for alert in alerts %}
        <div class="alert">
            <p>{{ alert.message }}</p>
            <p class="alert-date">Date: {{ alert.created_at }}</p>
        </div>
        {% empty %}
        <p>No alerts available.</p>
        {% endfor %}
    </div>
</body>
</html>
